<!DOCTYPE html>
<html lang="pt-br" xmlns="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Type" content="text/html">
    <link rel="stylesheet" th:href="@{/css/index.css}">
    <script th:src="@{js/script.js}"></script>
    <title>Atualizar Informações</title>
</head>
<body>
    <header class="header">
        <img th:src="@{img/logo-hybrid-theory.png}" class="header__logo" alt="Logo do álbum Hybrid Theory da banda de rock Linkin Park">
        <h1 class="header__title">Atualizar Informações</h1>
        <div class="header-nav">
            <nav class="navbar">
                <ul class="navbar__list">
                    <li><a th:href="@{/}" title="Página Inicial" class="navbar__link">Home</a></li>
                    <li><a th:href="@{integrantes_originais}" title="Integrantes Originais" class="navbar__link">Originais</a></li>
                    <li><a th:href="@{integrantes_atuais}" title="Integrantes Atuais" class="navbar__link">Atuais</a></li>
                    <li><a th:href="@{musicas}" title="Músicas" class="navbar__link">Músicas</a></li>
                    <li class="dropdown">
                        <a href="javascript:void(0)" class="navbar__link">Minha Conta</a>
                        <div class="dropdown__content">
                            <div th:if="${session.usuarioLogado == null}">
                                <a th:href="@{/form_user}" class="dropdown__link">Cadastrar</a>
                                <a th:href="@{/login}" class="dropdown__link">Fazer Login</a>
                            </div>
                            <div th:if="${session.usuarioLogado != null}">
                                <a th:href="@{/perfil}" class="dropdown__link">Ver Perfil</a>
                                <a th:href="@{/logout}" style="color: #ff4d4d;" class="dropdown__link">Sair</a>
                            </div>
                        </div>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <div th:if="${erro}" class="login-error">
            <p th:text="${erro}"></p>
        </div>

        <fieldset class="form-container">
            <form class="form-content" th:action="@{/usuario/atualizar}" method="post" th:object="${usuario}">
                <label for="currentEmail" class="form-label">E-mail Atual:</label>
                <input type="email" id="currentEmail" name="emailAtual" placeholder="Informe seu e-mail atual" required class="form-input">

                <label for="currentSenha" class="form-label">Senha Atual:</label>
                <input type="password" id="currentSenha" name="senhaAtual" placeholder="Informe sua senha atual" required class="form-input">

                <label for="nome" class="form-label">Novo Nome:</label>
                <input type="text" id="nome" th:field="*{nome}" th:placeholder="${usuario.nome}" required class="form-input">

                <label for="email" class="form-label">Novo E-mail:</label>
                <input type="email" id="email" th:field="*{email}" th:placeholder="${usuario.email}" required class="form-input">

                <label for="senha" class="form-label">Nova Senha:</label>
                <input type="password" id="senha" th:field="*{senha}" placeholder="Nova senha" required class="form-input">

                <button type="submit" class="form-button">Atualizar</button>
            </form>
        </fieldset>
    </main>

    <footer id="footer">
        <p>Projeto acadêmico - Desenvolvimento para Servidores II | Fatec Rubens Lara | Sistemas para Internet</p>
        <p>Feito por: Kauê de Oliveira Martins © 2026</p>
    </footer>
</body>
</html>
